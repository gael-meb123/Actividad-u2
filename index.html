<!DOCTYPE html>
<html lang="es">

<head>
    <!-- Metadatos de la página -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipo Charalitos a la 6ta</title> 
    <!-- Enlaces a los estilos CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Contenedor principal -->
    <div class="container">
        <!-- Encabezado con el nombre del equipo -->
        <h1 class="team-title">Equipo Charalitos a la 6ta</h1>
        
        <!-- Sección de descripción -->
        <p class="description">Esta página está hecha con HTML, CSS y JavaScript.</p>
        <p id="dateTimeMessage" class="datetime-message">Fecha y hora actual: --</p>
        
        <!-- Sección de integrantes -->
        <section class="members-section">
            <!-- Contenedor para la información del integrante actual -->
            <div class="member-card">
                <div class="member-image">
                    <img id="memberPhoto" src="https://via.placeholder.com/200?text=Integrante+1" alt="Foto del integrante">
                </div>
                <div class="member-info">
                    <h2 id="memberName">Integrante 1</h2>
                    <p id="memberDescription">Descripción del primer integrante del equipo Charalitos a la 6ta.</p>
                </div>
            </div>
        </section>
        
        <!-- Botones de control -->
        <div class="buttons-container">
            <!-- Botón para cambiar el color de fondo -->
            <button id="colorButton" class="btn-control btn-color">Cambiar fondo</button>
            <!-- Botón para cambiar tamaño/estilo de letra -->
            <button id="fontButton" class="btn-control btn-font">Cambiar estilo de texto</button>
            <!-- Botón para cambiar entre integrantes -->
            <button id="memberButton" class="btn-control btn-member">Siguiente integrante</button>
        </div>
    </div>
    
    <!-- Enlace al archivo JavaScript -->
    <script src="script.js"></script>
</body>

</html>
